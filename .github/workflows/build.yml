name: Build, Sign, and Publish ObservatorySafety EXE

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/ObservatorySafety.Service/ObservatorySafety.Service.csproj

    - name: Build
      run: dotnet build src/ObservatorySafety.Service/ObservatorySafety.Service.csproj --configuration Release

    - name: Publish single-file EXE
      run: dotnet publish src/ObservatorySafety.Service/ObservatorySafety.Service.csproj `
           --configuration Release `
           --runtime win-x64 `
           --self-contained true `
           /p:PublishSingleFile=true `
           /p:IncludeNativeLibrariesForSelfExtract=true `
           /p:PublishTrimmed=false `
           --output ./publish

    # ============================
    # Decode Base64 PFX certificate
    # ============================
    - name: Decode PFX certificate
      run: |
        echo "$env:SIGNING_CERT" | Out-File cert.b64
        certutil -decode cert.b64 cert.pfx
      shell: powershell
      env:
        SIGNING_CERT: ${{ secrets.SIGNING_CERT }}

    # ============================
    # Sign the EXE using signtool
    # ============================
    - name: Sign EXE
      run: |
        $kitPath = "C:\Program Files (x86)\Windows Kits\10\bin"
        $signtool = Get-ChildItem -Path $kitPath -Recurse -Filter signtool.exe |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        if (-not $signtool) {
            Write-Error "signtool.exe not found on this runner."
            exit 1
        }

        Write-Host "Using signtool at: $($signtool.FullName)"

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/ObservatorySafety.Service.exe
      shell: powershell
      env:
        SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

    - name: Upload signed EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ObservatorySafety-Service
        path: publish/ObservatorySafety.Service.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ObservatorySafety-Service
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ObservatorySafety v1.0.${{ github.run_number }}
        files: ./release/ObservatorySafety.Service.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
