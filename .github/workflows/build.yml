name: Build, Sign, and Publish ObservatorySafety EXEs + MSIs

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # ============================
    # Install WiX Toolset 3.14
    # ============================
    - name: Install WiX Toolset 3.14
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe -OutFile wix314.exe
        Start-Process .\wix314.exe -ArgumentList "/quiet" -Wait
        echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

    # ============================
    # Restore dependencies
    # ============================
    - name: Restore dependencies
      run: |
        dotnet restore src/ObservatorySafety.Service/ObservatorySafety.Service.csproj
        dotnet restore src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj

    # ============================
    # Build both projects
    # ============================
    - name: Build Service + Watchdog
      run: |
        dotnet build src/ObservatorySafety.Service/ObservatorySafety.Service.csproj --configuration Release
        dotnet build src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj --configuration Release

    # ============================
    # Publish single-file EXEs
    # ============================
    - name: Publish Service EXE
      shell: pwsh
      run: >
        dotnet publish src/ObservatorySafety.Service/ObservatorySafety.Service.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        /p:PublishSingleFile=true
        /p:IncludeNativeLibrariesForSelfExtract=true
        /p:PublishTrimmed=false
        /p:UseWindowsService=false
        /p:UseAppHost=true
        --output ./publish/service

    - name: Publish Watchdog EXE
      shell: pwsh
      run: >
        dotnet publish src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        /p:PublishSingleFile=true
        /p:IncludeNativeLibrariesForSelfExtract=true
        /p:PublishTrimmed=false
        /p:UseWindowsService=false
        /p:UseAppHost=true
        --output ./publish/watchdog

    # ============================
    # Publish loose files for MSI (NO UseWindowsService=false)
    # ============================
    - name: Publish Service (MSI loose files)
      shell: pwsh
      run: >
        dotnet publish src/ObservatorySafety.Service/ObservatorySafety.Service.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        /p:PublishSingleFile=false
        --output ./publish/service-msi

    - name: Publish Watchdog (MSI loose files)
      shell: pwsh
      run: >
        dotnet publish src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        /p:PublishSingleFile=false
        --output ./publish/watchdog-msi

    # ============================
    # Decode Base64 PFX certificate
    # ============================
    - name: Decode PFX certificate
      shell: pwsh
      run: |
        echo "$env:SIGNING_CERT" | Out-File cert.b64
        certutil -decode cert.b64 cert.pfx
      env:
        SIGNING_CERT: ${{ secrets.SIGNING_CERT }}

    # ============================
    # Sign EXEs
    # ============================
    - name: Sign EXEs
      shell: pwsh
      run: |
        $kitPath = "C:\Program Files (x86)\Windows Kits\10\bin"
        $signtool = Get-ChildItem -Path $kitPath -Recurse -Filter signtool.exe |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/service/ObservatorySafety.Service.exe

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/watchdog/ObservatorySafety.Watchdog.exe
      env:
        SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

    - name: DEBUG — List MSI publish folders
      shell: pwsh
      run: |
        Write-Host "=== SERVICE MSI FOLDER ==="
        Get-ChildItem -Recurse ./publish/service-msi

        Write-Host "=== WATCHDOG MSI FOLDER ==="
        Get-ChildItem -Recurse ./publish/watchdog-msi


    # ============================
    # Generate MSI installers (WiX v3)
    # ============================
    - name: Generate MSI installers
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path wix/generated -Force | Out-Null

        $root = $PWD
        $servicePath = Join-Path $root "publish/service-msi"
        $watchdogPath = Join-Path $root "publish/watchdog-msi"

        # Move EXEs out of the harvested folders so heat doesn't include them
        $serviceExe = Join-Path $servicePath "ObservatorySafety.Service.exe"
        $watchdogExe = Join-Path $watchdogPath "ObservatorySafety.Watchdog.exe"

        $servicePayload = Join-Path $servicePath "payload"
        $watchdogPayload = Join-Path $watchdogPath "payload"

        New-Item -ItemType Directory -Path $servicePayload -Force | Out-Null
        New-Item -ItemType Directory -Path $watchdogPayload -Force | Out-Null

        Get-ChildItem $servicePath -File | Where-Object { $_.Name -ne "ObservatorySafety.Service.exe" } | `
          ForEach-Object { Move-Item $_.FullName $servicePayload -Force }

        Get-ChildItem $watchdogPath -File | Where-Object { $_.Name -ne "ObservatorySafety.Watchdog.exe" } | `
          ForEach-Object { Move-Item $_.FullName $watchdogPayload -Force }

        # Harvest components (payload only, no EXE)
        heat dir $servicePayload -gg -sreg -scom -sfrag -srd -dr INSTALLDIR -cg ServiceComponents -out wix/generated/ServiceComponents.wxs
        heat dir $watchdogPayload -gg -sreg -scom -sfrag -srd -dr INSTALLDIR -cg WatchdogComponents -out wix/generated/WatchdogComponents.wxs

        # Compile Product + Components, passing EXE paths explicitly
        candle -dServiceExePath="$serviceExe" wix/Product.Service.wxs wix/generated/ServiceComponents.wxs -o wix/generated/
        candle -dWatchdogExePath="$watchdogExe" wix/Product.Watchdog.wxs wix/generated/WatchdogComponents.wxs -o wix/generated/

        # Link into MSIs, binding SourceDir to payload folders
        light -b $servicePayload wix/generated/Product.Service.wixobj wix/generated/ServiceComponents.wixobj -o publish/ObservatorySafety.Service.msi
        light -b $watchdogPayload wix/generated/Product.Watchdog.wixobj wix/generated/WatchdogComponents.wixobj -o publish/ObservatorySafety.Watchdog.msi

    # ============================
    # Sign MSIs
    # ============================
    - name: Sign MSIs
      shell: pwsh
      run: |
        $kitPath = "C:\Program Files (x86)\Windows Kits\10\bin"
        $signtool = Get-ChildItem -Path $kitPath -Recurse -Filter signtool.exe |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/ObservatorySafety.Service.msi

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/ObservatorySafety.Watchdog.msi
      env:
        SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

    # ============================
    # Upload artifacts
    # ============================
    - name: Upload signed EXEs + JSONs + MSIs
      uses: actions/upload-artifact@v4
      with:
        name: ObservatorySafety-Binaries
        path: |
          publish/service/ObservatorySafety.Service.exe
          publish/service/appsettings.json
          publish/watchdog/ObservatorySafety.Watchdog.exe
          publish/watchdog/appsettings.json
          publish/ObservatorySafety.Service.msi
          publish/ObservatorySafety.Watchdog.msi

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ObservatorySafety-Binaries
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ObservatorySafety v1.0.${{ github.run_number }}
        files: |
          ./release/service/ObservatorySafety.Service.exe
          ./release/service/appsettings.json#appsettings.service.json
          ./release/watchdog/ObservatorySafety.Watchdog.exe
          ./release/watchdog/appsettings.json#appsettings.watchdog.json
          ./release/ObservatorySafety.Service.msi
          ./release/ObservatorySafety.Watchdog.msi

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
