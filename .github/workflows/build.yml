name: Build, Sign, and Publish ObservatorySafety EXEs

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # ============================
    # Restore dependencies
    # ============================
    - name: Restore dependencies
      run: |
        dotnet restore src/ObservatorySafety.Service/ObservatorySafety.Service.csproj
        dotnet restore src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj

    # ============================
    # Build both projects
    # ============================
    - name: Build Service + Watchdog
      run: |
        dotnet build src/ObservatorySafety.Service/ObservatorySafety.Service.csproj --configuration Release
        dotnet build src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj --configuration Release

    # ============================
    # Publish both EXEs
    # ============================
    - name: Publish Service EXE
      run: dotnet publish src/ObservatorySafety.Service/ObservatorySafety.Service.csproj `
           --configuration Release `
           --runtime win-x64 `
           --self-contained true `
           /p:PublishSingleFile=true `
           /p:IncludeNativeLibrariesForSelfExtract=true `
           /p:PublishTrimmed=false `
           /p:UseWindowsService=false `
           --output ./publish/service

    - name: Publish Watchdog EXE
      run: dotnet publish src/ObservatorySafety.Watchdog/ObservatorySafety.Watchdog.csproj `
           --configuration Release `
           --runtime win-x64 `
           --self-contained true `
           /p:PublishSingleFile=true `
           /p:IncludeNativeLibrariesForSelfExtract=true `
           /p:PublishTrimmed=false `
           /p:UseWindowsService=false `
           --output ./publish/watchdog

    # ============================
    # Decode Base64 PFX certificate
    # ============================
    - name: Decode PFX certificate
      run: |
        echo "$env:SIGNING_CERT" | Out-File cert.b64
        certutil -decode cert.b64 cert.pfx
      shell: powershell
      env:
        SIGNING_CERT: ${{ secrets.SIGNING_CERT }}

    # ============================
    # Sign both EXEs
    # ============================
    - name: Sign EXEs
      run: |
        $kitPath = "C:\Program Files (x86)\Windows Kits\10\bin"
        $signtool = Get-ChildItem -Path $kitPath -Recurse -Filter signtool.exe |
                    Where-Object { $_.FullName -like "*x64*" } |
                    Select-Object -First 1

        if (-not $signtool) {
            Write-Error "signtool.exe not found on this runner."
            exit 1
        }

        Write-Host "Using signtool at: $($signtool.FullName)"

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/service/ObservatorySafety.Service.exe

        & $signtool.FullName sign `
          /f cert.pfx `
          /p $env:SIGNING_CERT_PASSWORD `
          /tr http://timestamp.digicert.com `
          /td sha256 `
          /fd sha256 `
          publish/watchdog/ObservatorySafety.Watchdog.exe
      shell: powershell
      env:
        SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

    # ============================
    # Upload artifacts
    # ============================
    - name: Upload signed EXEs + JSONs
      uses: actions/upload-artifact@v4
      with:
        name: ObservatorySafety-Binaries
        path: |
          publish/service/ObservatorySafety.Service.exe
          publish/service/appsettings.json
          publish/watchdog/ObservatorySafety.Watchdog.exe
          publish/watchdog/appsettings.json

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ObservatorySafety-Binaries
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ObservatorySafety v1.0.${{ github.run_number }}
        files: |
          ./release/ObservatorySafety.Service.exe
          ./release/appsettings.json
          ./release/ObservatorySafety.Watchdog.exe
          ./release/appsettings.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
